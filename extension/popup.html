<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 200px;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', -apple-system, sans-serif;
      padding: 1rem;
    }
    .logo { font-size: 1rem; font-weight: 800; background: linear-gradient(135deg, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.75rem; }
    textarea {
      width: 100%; min-height: 80px; background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; color: #e6edf3; font-size: 0.82rem; padding: 0.6rem;
      resize: vertical; outline: none; font-family: inherit;
    }
    button {
      width: 100%; margin-top: 0.6rem; padding: 0.6rem; background: linear-gradient(135deg, #7c3aed, #0891b2);
      border: none; border-radius: 8px; color: #fff; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .result { margin-top: 0.75rem; padding: 0.75rem; background: #161b22; border: 1px solid #238636; border-radius: 8px; font-size: 0.8rem; line-height: 1.6; color: #3fb950; display: none; }
    .score { font-size: 0.75rem; color: #a855f7; margin-bottom: 0.4rem; font-weight: 700; }
    .verdict { font-size: 0.75rem; color: #c084fc; margin-top: 0.5rem; font-style: italic; }
    .copy-btn { background: #21262d; border: 1px solid #30363d; margin-top: 0.4rem; color: #e6edf3; font-size: 0.78rem; padding: 0.4rem; }
    .error { color: #f85149; font-size: 0.8rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="logo">⚡ PromptForge AI</div>
  <textarea id="prompt" placeholder="Paste your prompt here..."></textarea>
  <button onclick="optimize()">⚡ Optimize + Compare</button>
  <div id="error" class="error"></div>
  <div id="result" class="result">
    <div id="score" class="score"></div>
    <div id="improved"></div>
    <div id="verdict" class="verdict"></div>
    <button class="copy-btn" onclick="copyResult()">📋 Copy Optimized Prompt</button>
  </div>
  <script>
    let lastResult = "";
    async function optimize() {
      const prompt = document.getElementById("prompt").value.trim();
      if (!prompt) return;
      document.getElementById("error").textContent = "";
      document.getElementById("result").style.display = "none";
      try {
        const res = await fetch("http://localhost:5000/optimize/demo", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        lastResult = data.improved;
        document.getElementById("score").textContent = `⚡ Score: ${data.score}/100`;
        document.getElementById("improved").textContent = data.improved;
        document.getElementById("verdict").textContent = data.verdict || "";
        document.getElementById("result").style.display = "block";
      } catch {
        document.getElementById("error").textContent = "⚠️ Connect backend to use full features";
      }
    }
    function copyResult() {
      navigator.clipboard.writeText(lastResult);
    }
  </script>
</body>
</html>
